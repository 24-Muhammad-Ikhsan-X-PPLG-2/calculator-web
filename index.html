<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <!-- Font Inter dibawah -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-calc">
      <div class="container">
        <div class="hasil-calc" id="hasil-calc"></div>
        <div class="numbers">
          <div onclick="clearNumber()">
            <p>AC</p>
          </div>
          <div onclick="times()">
            <img
              src="assets/img/multiplication.png"
              class="multiplication-img"
              alt=""
            />
          </div>
          <div onclick="plus()">
            <img src="assets/img/plus.png" class="plus-img" alt="" />
          </div>
          <div onclick="minus()">
            <img src="assets/img/minus-sign.png" class="minus-img" alt="" />
          </div>
        </div>
        <div class="numbers">
          <div onclick="addNumber('7')">
            <p>7</p>
          </div>
          <div onclick="addNumber('8')">
            <p>8</p>
          </div>
          <div onclick="addNumber('9')">
            <p>9</p>
          </div>
          <div onclick="divide()">
            <img src="assets/img/divide.png" class="divide-img" alt="" />
          </div>
        </div>
        <div class="numbers">
          <div onclick="addNumber('4')">
            <p>4</p>
          </div>
          <div onclick="addNumber('5')">
            <p>5</p>
          </div>
          <div onclick="addNumber('6')">
            <p>6</p>
          </div>
          <div onclick="deleteNum()">
            <img src="assets/img/delete.png" class="del-img" alt="" />
          </div>
        </div>
        <div class="numbers">
          <div onclick="addNumber('1')">
            <p>1</p>
          </div>
          <div onclick="addNumber('2')">
            <p>2</p>
          </div>
          <div onclick="addNumber('3')">
            <p>3</p>
          </div>
          <div onclick="equals()">
            <p>=</p>
          </div>
        </div>
        <div class="numbers">
          <div onclick="addNumber('0')">
            <p>0</p>
          </div>
          <div onclick="titik()">
            <p>,</p>
          </div>
          <div onclick="addKurungBuka()">
            <p>(</p>
          </div>
          <div onclick="addKurungTutup()">
            <p>)</p>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/script.js"></script>
  </body>
</html>
